sources:
  rain_gauge_source:
    type: csv
    file: examples/data/rain_gauge.csv
    timestamp_column: timestamp

destinations:
  mqtt_destination:
    type: mqtt

devices:
  station1:
    vars:
      location: "Modena"
    sensors:
      rain_gauge_sensor:
        source: rain_gauge_source
        destinations:
          mqtt_destination:
            endpoint: "{device}/{var:location}"

  station2:
    vars:
      location: "Reggio Emilia"
    sensors:
      rain_gauge_sensor:
        source: rain_gauge_source
        destinations:
          mqtt_destination:
            endpoint: "{device}/{var:location}"

  station3:
    vars:
      location: "Mantova"
    sensors:
      rain_gauge_sensor:
        source: rain_gauge_source
        destinations:
          mqtt_destination:
            endpoint: "{device}/{var:location}"