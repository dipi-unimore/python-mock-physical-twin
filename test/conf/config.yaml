devices:
  - id: device1
    sensors:
      - id: sensor_accel_x_sec
        type: numeric
        unit: g
        update_time_ms: 1000  # 1 second in milliseconds
        csv_file: accelerometer_data_seconds.csv
        value_column: accel_x
        use_csv_timestamp: True
        timestamp_column: timestamp
        timestamp_unit: second
      - id: sensor_accel_x_millisec
        type: numeric
        unit: g
        update_time_ms: 1000  # 1 second in milliseconds
        csv_file: accelerometer_data_millisec.csv
        value_column: accel_x
        use_csv_timestamp: True
        timestamp_column: timestamp
        timestamp_unit: millisec
      - id: sensor_accel_x_nanosec
        type: numeric
        unit: g
        update_time_ms: 1000  # 1 second in milliseconds
        csv_file: accelerometer_data_nanosec.csv
        value_column: accel_x
        use_csv_timestamp: True
        timestamp_column: timestamp
        timestamp_unit: nanosec
    actuators:
      - id: actuator1
        type: string
        unit: command
    protocol:
      type: mqtt
      broker: test.mosquitto.org
      port: 1883
      topic: iot/device1
    independent_communication: True
    device_update_delay: 10000  # 10 seconds in milliseconds if independent_communication is False
  - id: device2
    sensors:
      - id: sensor4
        type: string
        unit: message
        update_time_ms: 10000  # 10 seconds in milliseconds
    actuators:
      - id: actuator2
        type: numeric
        unit: level
    protocol:
      type: http
      url: http://example.com/api/device2
      server_port: 5000
    independent_communication: False
    device_update_delay: 15000  # 15 seconds in milliseconds if independent_communication is False
