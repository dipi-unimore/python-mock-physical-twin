destinations:
  mqtt:
    type: mqtt
    broker_hostname: localhost
    broker_port: 1883

  http:
    type: http
    base_url: http://localhost:8081

  local:
    type: local
    directory: ./output
    
sources:

  position:
    type: csv
    file: ./data/latlong.csv
    columns:    # specify which columns to read from the CSV and send to sensors
      - latitude
      - longitude
    timestamp_column: timestamp

  # if no columns are specified, all columns will be read and sent

  house1_humidity:
    type: csv
    file: ./data/humidity.csv
    timestamp_column: timestamp   # used instead of `interval` for time-based data, it considers the time differences in the CSV

  house1_temperature:
    type: random
    rv: uniform
    min: 10
    max: 100
    step: 0.1
    interval: 5

  house1_heater:
    type: mqtt
    topic: smarthome1/heater
    broker_hostname: localhost
    broker_port: 1883

  house1_light:
    type: http  # server
    path: /smarthome1/light
    method: POST
    



devices:
  smarthome1:
    vars:
      room1: living_room
      room2: bedroom
    sensors:
      light:
        source: house1_light
        destinations:
          mqtt:
            endpoint: smarthome1/light
          http:
            endpoint: sensors/light
          local:
            endpoint: "{device}/{sensor}/{var:room1}/{source}"

      heater:
        source: house1_heater
        destinations:
          mqtt:
            endpoint: smarthome1/heater
          local:
            endpoint: "{device}/{sensor}/{var:room1}/{source}"

      latlong:
        source: position
        destinations:
          mqtt:
            endpoint: smarthome1/latlong
          local:
            endpoint: "{device}/{sensor}/{var:room2}/{source}"

      temperature:
        source: house1_temperature
        function_path: /path/to/temperature_function.py # input, current state -> new state | raise
        interval: 2  # Override source interval to 2 seconds
        # ^^^ buffering, mantiene l'ultimo valore e lo invia ogni 2 secondi
        destinations:
          mqtt:
            endpoint: "{device}/{sensor}/{var:room1}/{source}"
          local:
            endpoint: "{device}/{sensor}/{var:room1}/{source}"
            
      humidity:
        source: house1_humidity
        destinations:
          mqtt:
            endpoint: smarthome1/humidity
          http:
            endpoint: sensors/humidity
          local:
            endpoint: "{device}/{sensor}/{var:room2}/{source}"

        # TODO: ok partire con JSON semplice, poi estendere con decisione developer
    
    # TODO:
    actuators:
      switch:
        actuator_source: http_source
        function_path: /path/to/switch_function.py # input, current state -> new state | raise
        destinations:   # se http potrebbe non essere necessaria una destination
          mqtt:
            endpoint: smarthome1/switch



# sensor: source -> stateX -> destination
# actuator: input -> stateX -> destination


