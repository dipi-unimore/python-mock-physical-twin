protocols:
  - id: "simulationBridge"
    type: "simulation_bridge_mqtt"
    config:
      client_config:
        mqtt:
          host: "localhost"
          port: 1883
          keepalive: 60
          qos: 0
          input_topic: "bridge/input"
          output_topic: "bridge/output"
          username: "guest"
          password: "guest"
          tls: false
      simulation_api: "simulation.yaml"
      aggregate:
        device_id: "device1"
        sensor_id: "bridgeAggregate"
        sensor_config:
          type: "string"
          update_time_ms: 1000
      routes:
        - when:
            type: "all"
          publish:
            topic: "sim/data"
            payload: "{raw}"
        - when:
            type: "json_path"
            path: "agents"
            foreach: true
          publish:
            topic: "sim/agents/{index}"
            payload:
              x: "{0}"
              y: "{1}"
        - when:
            type: "json_path"
            path: "agents"
            foreach: true
          publish:
            topic: "sim/agents/{index}/x"
            payload: "{0}"
        - when:
            type: "json_path"
            path: "agents"
            foreach: true
          publish:
            topic: "sim/agents/{index}/y"
            payload: "{1}"
        - when:
            type: "json_path"
            path: "distance"
          publish:
            topic: "sim/distance"
            payload: "{value}"
        - when:
            type: "json_path"
            path: "step"
          publish:
            topic: "sim/step"
            payload: "{value}"
devices:
  - id: "device1"
    protocol_id: "simulationBridge"
    sensors:
      - id: "bridgeAggregate"
        type: "string"
        update_time_ms: 60000
        initial_value: {}
    actuators: []
independent_communication: False
device_update_delay_ms: 1000
