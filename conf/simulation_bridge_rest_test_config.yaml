protocols:
  - id: "simulationBridge"
    type: "simulation_bridge_rest"
    config:
      server_port: 5556
      client_config:
        url: "https://127.0.0.1:5000/message"
        secret: "CHANGE_ME_TO_A_LONG_RANDOM_VALUE"
        issuer: "simulation-bridge"
        subject: "client-123"
        ttl: 900
        timeout: 600
        ssl_verify: false
      simulation_api: "simulation.yaml"
      aggregate:
        device_id: "device1"
        sensor_id: "bridgeAggregate"
        sensor_config:
          type: "string"
          update_time_ms: 1000
devices:
  - id: "device1"
    protocol_id: "simulationBridge"
    sensors:
      - id: "bridgeAggregate"
        type: "string"
        update_time_ms: 60000
        initial_value: {}
    actuators: []
independent_communication: False
device_update_delay_ms: 1000
