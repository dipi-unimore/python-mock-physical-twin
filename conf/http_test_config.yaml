protocols:
  - id: "httpProtocol"
    type: "http"
    config:
      server_port: 5555
devices:
  - id: "device1"
    protocol_id: "httpProtocol"
    sensors:
      - id: "numericSensor"
        type: "numeric"
        update_time_ms: 2000  # Update every 2 seconds
        min_val: 0
        max_val: 100
        initial_value: 0
      - id: "booleanSensor"
        type: "boolean"
        update_time_ms: 2000  # Update every 2 seconds
        initial_value: false
      - id: "randomStringSensor"
        type: "random_string"
        value_len: 10
        update_time_ms: 2000  # Update every 2 seconds
      - id: "fixedStringSensor"
        type: "fixed_string"
        value: "test-fixed-string"
        update_time_ms: 2000  # Update every 2 seconds
    actuators:
      - id: "demoActuator"
        type: "string"
        initial_value: "ON"
independent_communication: True
device_update_delay_ms: 10  # Update every 10 seconds if independent_communication is False
